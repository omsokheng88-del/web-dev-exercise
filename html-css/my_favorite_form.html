<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Chinese Drama</title>
    <link rel="stylesheet" href="./my_favorite_form.css">
</head>
<body>
    <main class="container">
    <h1>Add a New Chinese Drama</h1>
    <form action="#" method="post" class="card">
        
        <div class="form-row">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required placeholder="input" />
            <small class="hint"> Enter the official or widely known English title.</title></small>
        </div>
<div class="form-row">
        <label for="birthday">Start Date:</label>
        <input type="date" id="birthday" name="birthday">
    </div>
            <fieldset class="form-row">
             <legend>Type</legend>
             <div class="radios">
                <label><input type="radio" name="type" value="TV" /> TV</label>
                <label><input type="radio" name="type" value="Film" /> Film</label>
                <label><input type="radio" name="type" value="ONA" /> ONA</label>
             </div>
            </fieldset>

            <div class="form-row">
                <label for="genre">Genre</label>
                <label id="genre" name="genre"required>
                <select name="genre" id="genre">
                    <option value="" selected disabled>Choose a genre</option>
                    <option>Action</option>
                    <option>Advanture</option>
                    <option>Dark Fantasy</option>
                    <option>Comedy</option>
                    <option>Funny</option>
                    <option>Drama</option>
                </select>
            </div>
  <div class="form-row">
            <label class="quantity">Rating</label>
            <input type="number" id="quantity" name="quantity" min="0" max="100" step="10">
        </div>
            <div class="textarea">
            <div class="form-row">
                <label for="summary">Summary</label>
                <textarea id="summary" name="summary" rows="5" placeholder="1-3 sentences about the story..." required></textarea>
                <small class="hint">Keep it concise (max ~300 characters)</small>
            </div>

            <div class="action">
                <button type="submit">Save</button>
                <button type="reset" class="secondary">Clear</button>
            </div>

        </div>
    </form>
 </main>
        
    
</body>
</html>
